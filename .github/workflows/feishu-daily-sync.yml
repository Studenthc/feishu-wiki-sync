name: Feishu Wiki Daily Sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Install Feishu CLI
        run: pnpm add -g @larksuite/cli
      
      - name: Configure Feishu CLI
        run: |
          printf '%s' "$FEISHU_APP_SECRET" | lark-cli config init --app-id "$FEISHU_APP_ID" --app-secret-stdin --brand feishu
          lark-cli config default-as bot
          lark-cli doctor --offline
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      
      - name: Run daily sync
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
          APIMART_TEXT_API_KEY: ${{ secrets.APIMART_TEXT_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
          APIMART_TEXT_MODEL: ${{ vars.APIMART_TEXT_MODEL }}
          APIMART_TEXT_API_URL: ${{ vars.APIMART_TEXT_API_URL }}
          APIMART_TEXT_MAX_TOKENS: ${{ vars.APIMART_TEXT_MAX_TOKENS }}
          APIMART_TEXT_TIMEOUT_MS: ${{ vars.APIMART_TEXT_TIMEOUT_MS }}
          GRSAI_API_KEY: ${{ secrets.GRSAI_API_KEY }}
          GRSAI_MODEL: ${{ vars.GRSAI_MODEL }}
          GRSAI_API_URL: ${{ vars.GRSAI_API_URL }}
          GRSAI_MAX_TOKENS: ${{ vars.GRSAI_MAX_TOKENS }}
          GRSAI_TIMEOUT_MS: ${{ vars.GRSAI_TIMEOUT_MS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          CHINESE_BATCH_SIZE: ${{ vars.CHINESE_BATCH_SIZE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          REQUIRE_CHINESE: "true"
          LARK_IDENTITY: "bot"
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_SPACE_ID: ${{ secrets.FEISHU_SPACE_ID }}
        run: pnpm sync:daily -- --opportunity --case-study
